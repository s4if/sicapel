<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SICAPEL{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/v/bs5/dt-2.1.8/datatables.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body hx-boost="true" hx-push-url="true">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/v/bs5/dt-2.1.8/datatables.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  <div class="app-layout">
    {% if current_user and current_user.is_authenticated %}
      {% include "_sidebar.html" %}
      <div class="app-sidebar-backdrop" id="sidebarBackdrop" data-sidebar-close></div>
    {% endif %}
    <div class="app-main">
      {% if current_user and current_user.is_authenticated %}
      <header class="app-topbar">
        <button class="btn btn-sm btn-link text-decoration-none text-secondary d-lg-none"
                type="button" aria-label="Buka menu" id="sidebarToggle">
          <i class="bi bi-list fs-4"></i>
        </button>
        <div class="app-topbar-user ms-auto">
          <span class="text-truncate">{{ current_user.name }}</span>
          <span class="badge text-bg-secondary text-capitalize">{{ current_user.role }}</span>
          <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('auth.logout') }}"
             hx-boost="false"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>
      </header>
      {% endif %}
      <main class="p-4">
        <div id="hx_content">
          {% block content %}{% endblock %}
        </div>
      </main>
    </div>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
