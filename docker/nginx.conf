upstream app {
    server app:8000;
}

server {
    listen 80;
    server_name _;

    # ── Upload limit (matching MAX_CONTENT_LENGTH in app/__init__.py) ────
    client_max_body_size 20M;

    # ── Static files (served directly by nginx for performance) ──────────
    location /static/ {
        alias /app/app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Uploaded files (internal — never accessed directly by clients) ──
    # Flask serves uploads via X-Accel-Redirect or send_file.
    # This block makes nginx handle the actual file I/O.
    location /uploads/ {
        internal;
        alias /var/lib/sicapel/uploads/;
    }

    # ── Application proxy ────────────────────────────────────────────────
    location / {
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
